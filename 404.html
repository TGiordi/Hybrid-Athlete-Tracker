<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Redirigiendo HAT...</title>
    <script type="text/javascript">
        // Este script captura la ruta, los parámetros (?x=y) y el hash (#token=...)
        // y los redirige de vuelta a tu index principal sin romper la página.
        var search = window.location.search;
        var hash = window.location.hash;
        window.location.replace("/Hybrid-Athlete-Tracker/" + search + hash);
    </script>
</head>
<body style="background-color: #0a0a0a; color: #F54927; font-family: sans-serif; text-align: center; padding-top: 20vh;">
    <h2>Cargando tu sesión...</h2>
</body>
</html>
