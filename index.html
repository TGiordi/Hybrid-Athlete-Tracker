<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Potencia - Axolote Style</title>
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAYAAABXAVmHAAAACXBIWXMAAAsTAAALEwEAmpwYAAACxklEQVR4nO2YTUgUURTH//+9O5PjjI0R9pGCIYkiqCBIKIKgghKCEEIJggoigoiCCoqIIiICK4iIIogIogiqoIIgIgiqCKqggiCqCKqggqgIioIigoigIoiIoCKKCv8eXvW/Xv8O6+7M3pkPZne22b8HwA/w5Xw8C4B/gY24Rnx4FQAjYhN+vXgFALw4D984F/5xTnxwEQA8OAtfOAn9wYfzcI/z8IXz8IWf6p//h4P9cIcX+8U+bHIn5+E758InuPDB7XCHp/un/v4u6s8h/u53Y/88FvbhZ+/A+t4Fq4m88U7Xf0f9b6/b/f4u+u6i7f7pX7T5P/f7fN6P+R3V4eS9S4eT95YfCqf0I9r/Sj6qf0X7P6H9p9S/4rE4/Yjqj/Ljh8NrvzofD+9f3of4X+fDf6YfSvefG4fS/+4WnIeX4Dx84zx8AnHwCa44DzfBGX64v6IPr8F3PhL6U//8I9Q/pP4p9X/4uTjwfXFwDpzD5/AnuOI8vAVR8AlEwSe44jz8DafwMfwMfoIrfAw9OAnOwUlwDk4C5+EpOAWm4BSYAm7hJv7gXbwD/9rP4B9wBk5A5+AhOIGm4ASeArfDHeCGM8ApMAGmwBS4A9ygKThb8F1Mgykwhf3NFN7FNJgC61D/oPqH6p8S+5j0L6p/vP/b5/N+4Tz8Adf5SPhP/fMv7v6p//wU+/7C/fC3P8X3/Y37X+/+w4v7w5P3R0J/55+/uN8T3u8n5792X//C+X+W2p74/8S/5L8fFvxX7P8X/V/sf73/P/mP15f4/88T/Y8X9X/T/yX+S/xX7f+R7v8O9V9X9Y/3f0v956fq+7+4/5eN/v/Wf//B5+XG58Xm5+nG5+XW5+vW5+vm5+Pm58Pm5+Pm56L4XN4X5Xm44pW54pW54pX5YhXpYhUfP5//4H/8f/x/4v9N/X9p/V9S9/9hS+3/D5e//+D/D/7/+Af/f5P/AP8BEwY/f/kPABMAAAAASUVORK5CYII=">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], },
                    colors: {
                        // PALETA AXOLOTE INGENIERÍA (Tech / Industrial)
                        axolote: {
                            bg: '#0B1120',       // Azul noche muy profundo (Fondo principal)
                            card: '#131B2F',     // Azul marino oscuro (Fondo de las tarjetas)
                            border: '#1E293B',   // Gris azulado para bordes
                            primary: '#0EA5E9',  // Azul eléctrico / Cian (Botones activos)
                            hover: '#0284C7',    // Cian más oscuro para hover
                            text: '#F8FAFC',     // Blanco puro para textos principales
                            textMuted: '#94A3B8' // Gris claro para textos secundarios
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0B1120; color: #F8FAFC; }
        
        /* Ocultar flechas molestas de los inputs de número para que no corten el texto */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }

        .tab-btn { color: #94A3B8; border-bottom: 3px solid transparent; }
        .tab-btn.active { border-bottom: 3px solid #0EA5E9; color: #F8FAFC; font-weight: 700; }
        
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: #0EA5E9; cursor: pointer;}
        
        .canvas-container { display: none; margin-top: 1.5rem; height: 200px; }
    </style>
</head>
<body class="p-4 pb-20 max-w-7xl mx-auto font-sans">

    <header class="text-center mb-10 mt-6 flex flex-col items-center gap-2">
        <h1 class="text-2xl md:text-3xl font-bold text-axolote-text uppercase tracking-wide">Mi Potencia</h1>
        <div class="h-1 w-20 bg-axolote-primary rounded"></div>
    </header>

    <div class="flex justify-around border-b border-axolote-border mb-8 pb-3">
        <button class="tab-btn active font-semibold text-lg transition-colors pb-2 px-2" onclick="showDay('martes')">Martes</button>
        <button class="tab-btn font-semibold text-lg transition-colors pb-2 px-2" onclick="showDay('jueves')">Jueves</button>
        <button class="tab-btn font-semibold text-lg transition-colors pb-2 px-2" onclick="showDay('sabado')">Sábado</button>
    </div>

    <div id="exercise-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>

    <script>
        // Setear la fuente y colores globales de Chart.js al estilo de la página
        Chart.defaults.font.family = "'Montserrat', sans-serif";
        Chart.defaults.color = '#94A3B8';

        const routine = {
            martes: [
                { id: 'm1', name: 'Press Inclinado Barra', sets: 4, target: '8-10 reps', ytId: '2bKcaD7lHLs' },
                { id: 'm2', name: 'Jalón al Pecho (Abierto)', sets: 3, target: '10-12 reps', ytId: 'ryKtvHifeiU' },
                { id: 'm3', name: 'Remo Gironda', sets: 3, target: '10-12 reps', ytId: 'GZbfZ033f74' },
                { id: 'm4', name: 'Curl de Bíceps', sets: 3, target: '10 reps', ytId: 'ykJmrZ5v0Oo' },
                { id: 'm5', name: 'Extensión Tríceps (Soga)', sets: 3, target: '12 reps', ytId: 'vB5OHsJ3EME' },
                { id: 'm6', name: 'Elevaciones Laterales', sets: 3, target: 'Al fallo', ytId: '3VcKaXpzqRo' },
                { id: 'm7', name: 'Encogimientos Mancuernas', sets: 2, target: '15-20 reps', ytId: 'cJRVVxmytaM' }
            ],
            jueves: [
                { id: 'j1', name: 'Sentadilla Libre', sets: 4, target: '6-8 reps', ytId: 'VZpCjz340CY' },
                { id: 'j2', name: 'Extensión Cuádriceps', sets: 4, target: '15 reps', ytId: 'YyvSfVjQeL0' },
                { id: 'j3', name: 'Curl de Isquios', sets: 4, target: '12 reps', ytId: 'NSgMSk3L_Z4' },
                { id: 'j4', name: 'Pantorrillas Parado', sets: 4, target: '15 reps', ytId: 'ym1eb5PDUqs' },
                { id: 'j5', name: 'Plancha Frontal (Plank)', sets: 3, target: '45-60 seg', ytId: 'pSHjTRCQxIw' },
                { id: 'j6', name: 'Elevación de Piernas', sets: 3, target: '15 reps', ytId: 'l4kQd9eFSmo' },
                { id: 'j7', name: 'Rueda Abdominal / Deadbug', sets: 3, target: '12 reps', ytId: 'g_B1OaA10pA' }
            ],
            sabado: [
                { id: 's1', name: 'Press Inclinado Barra', sets: 4, target: '8-10 reps', ytId: '2bKcaD7lHLs' },
                { id: 's2', name: 'Jalón al Pecho (Cerrado)', sets: 3, target: '10-12 reps', ytId: 'ecH_r1A14xM' },
                { id: 's3', name: 'Remo Gironda', sets: 3, target: '10-12 reps', ytId: 'GZbfZ033f74' },
                { id: 's4', name: 'Curl de Bíceps', sets: 3, target: '10 reps', ytId: 'ykJmrZ5v0Oo' },
                { id: 's5', name: 'Extensión Tríceps (Polea)', sets: 3, target: '12 reps', ytId: '2-LAMcpzODU' },
                { id: 's6', name: 'Elevaciones Laterales', sets: 3, target: 'Al fallo', ytId: '3VcKaXpzqRo' },
                { id: 's7', name: 'Encogimientos', sets: 2, target: '15-20 reps', ytId: 'cJRVVxmytaM' }
            ]
        };

        const currentCharts = {};

        function showDay(day) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === day || (day==='sabado' && btn.innerText==='Sábado')) btn.classList.add('active');
            });

            const container = document.getElementById('exercise-container');
            container.innerHTML = '';

            routine[day].forEach(ex => {
                let setsHtml = '';
                for(let i=1; i<=ex.sets; i++) {
                    setsHtml += `
                        <div class="flex items-center justify-between mb-3 bg-axolote-bg p-3 rounded-lg border border-axolote-border shadow-sm">
                            <span class="w-16 text-sm font-medium text-axolote-textMuted">Serie ${i}</span>
                            
                            <input type="number" id="peso-${ex.id}-${i}" placeholder="Kg" class="w-20 md:w-24 px-1 py-2 rounded bg-axolote-bg border border-axolote-border text-axolote-text text-center focus:outline-none focus:border-axolote-primary transition-colors">
                            <input type="number" id="reps-${ex.id}-${i}" placeholder="Rep" class="w-20 md:w-24 px-1 py-2 rounded bg-axolote-bg border border-axolote-border text-axolote-text text-center focus:outline-none focus:border-axolote-primary transition-colors">
                            
                            <input type="checkbox" id="check-${ex.id}-${i}">
                        </div>
                    `;
                }

                // Genera la miniatura de YouTube automáticamente como imagen principal
                const imgUrl = `https://img.youtube.com/vi/${ex.ytId}/hqdefault.jpg`;

                const card = `
                    <div class="bg-axolote-card p-5 md:p-6 rounded-2xl shadow-lg border border-axolote-border">
                        
                        <div class="mb-5 bg-axolote-bg border border-axolote-border rounded-lg overflow-hidden flex justify-center items-center">
                            <img src="${imgUrl}" alt="${ex.name}" class="w-full aspect-video object-cover opacity-90">
                        </div>
                        
                        <h3 class="text-xl md:text-2xl font-bold mb-1 text-axolote-text">${ex.name}</h3>
                        <p class="text-sm font-medium text-axolote-textMuted mb-5">Objetivo: ${ex.sets} series x ${ex.target}</p>
                        
                        <div class="aspect-video rounded-lg overflow-hidden border border-axolote-border mb-6 bg-black shadow-inner">
                            <iframe 
                                class="w-full h-full" 
                                src="https://www.youtube.com/embed/${ex.ytId}" 
                                title="Técnica de ${ex.name}" 
                                frameborder="0" 
                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                allowfullscreen>
                            </iframe>
                        </div>

                        ${setsHtml}
                        
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                            <button onclick="saveData('${ex.id}', ${ex.sets}, '${ex.name}')" class="bg-axolote-primary hover:bg-axolote-hover text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-md">
                                Guardar Hoy
                            </button>
                            <button onclick="toggleChart('${ex.id}', '${ex.name}')" id="btn-chart-${ex.id}" class="bg-axolote-bg hover:bg-axolote-border border border-axolote-border text-axolote-textMuted font-medium py-3 px-4 rounded-xl transition-colors text-sm shadow-sm">
                                Ver Evolución
                            </button>
                        </div>

                        <div id="chart-container-${ex.id}" class="canvas-container bg-axolote-bg p-3 rounded-xl border border-axolote-border">
                            <canvas id="chart-${ex.id}"></canvas>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function saveData(exId, totalSets, exName) {
            let maxWeight = 0;
            for(let i=1; i<=totalSets; i++) {
                const isChecked = document.getElementById(`check-${exId}-${i}`).checked;
                if(isChecked) {
                    const weight = parseFloat(document.getElementById(`peso-${exId}-${i}`).value) || 0;
                    if(weight > maxWeight) maxWeight = weight;
                }
            }

            if(maxWeight > 0) {
                const today = new Date().toLocaleDateString('es-AR', {day: 'numeric', month: 'short'});
                let history = JSON.parse(localStorage.getItem('workoutData')) || {};
                
                if(!history[exName]) history[exName] = { dates: [], weights: [] };
                
                const lastIndex = history[exName].dates.indexOf(today);
                if(lastIndex > -1) {
                    history[exName].weights[lastIndex] = maxWeight;
                } else {
                    if(history[exName].dates.length >= 10){
                        history[exName].dates.shift();
                        history[exName].weights.shift();
                    }
                    history[exName].dates.push(today);
                    history[exName].weights.push(maxWeight);
                }

                localStorage.setItem('workoutData', JSON.stringify(history));
                
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = "✓ Registrado";
                btn.classList.replace('bg-axolote-primary', 'bg-emerald-600');
                btn.classList.replace('hover:bg-axolote-hover', 'hover:bg-emerald-700');
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.replace('bg-emerald-600', 'bg-axolote-primary');
                    btn.classList.replace('hover:bg-emerald-700', 'hover:bg-axolote-hover');
                }, 1500);

                const chartDiv = document.getElementById(`chart-container-${exId}`);
                if(chartDiv.style.display === 'block') {
                    renderIndividualChart(exId, exName);
                }

            } else {
                alert('Tildá al menos una serie completada y poné el peso máximo para guardar el progreso de hoy.');
            }
        }

        function toggleChart(exId, exName) {
            const chartDiv = document.getElementById(`chart-container-${exId}`);
            const btn = document.getElementById(`btn-chart-${exId}`);
            
            if(chartDiv.style.display === 'block') {
                chartDiv.style.display = 'none';
                btn.innerText = "Ver Evolución";
            } else {
                chartDiv.style.display = 'block';
                btn.innerText = "Ocultar Evolución";
                renderIndividualChart(exId, exName);
            }
        }

        function renderIndividualChart(exId, exName) {
            const historyData = JSON.parse(localStorage.getItem('workoutData')) || {};
            const exerciseData = historyData[exName];

            if(!exerciseData || exerciseData.dates.length < 2) {
                const ctx = document.getElementById(`chart-${exId}`).getContext('2d');
                ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
                // Ahora tomará la fuente Montserrat gracias a la configuración global de arriba
                ctx.fillText('Se necesitan al menos 2 sesiones guardadas', 10, 50);
                return;
            }

            if(currentCharts[exId]) { currentCharts[exId].destroy(); }

            const ctx = document.getElementById(`chart-${exId}`).getContext('2d');
            
            currentCharts[exId] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: exerciseData.dates,
                    datasets: [{
                        label: 'Máxima Carga (Kg)',
                        data: exerciseData.weights,
                        borderColor: '#0EA5E9', // Color Cian de Axolote
                        backgroundColor: 'rgba(14, 165, 233, 0.1)',
                        borderWidth: 3,
                        tension: 0.3,
                        pointRadius: 5,
                        pointBackgroundColor: '#F8FAFC',
                        pointBorderColor: '#0EA5E9'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { 
                            beginAtZero: false, 
                            grid: { color: '#1E293B' }, // Color de borde sutil
                        },
                        x: { 
                            grid: { display: false }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        showDay('martes');
    </script>
</body>
</html>
