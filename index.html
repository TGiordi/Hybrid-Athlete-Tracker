<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Potencia</title>
    <link rel="icon" type="image/png" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAADAAAAAwCAYAAABXAVmHAAAACXBIWXMAAAsTAAALEwEAmpwYAAACxklEQVR4nO2YTUgUURTH//+9O5PjjI0R9pGCIYkiqCBIKIKgghKCEEIJggoigoiCCoqIIiICK4iIIogIogiqoIIgIgiqCKqggiCqCKqggqgIioIigoigIoiIoCKKCv8eXvW/Xv8O6+7M3pkPZne22b8HwA/w5Xw8C4B/gY24Rnx4FQAjYhN+vXgFALw4D984F/5xTnxwEQA8OAtfOAn9wYfzcI/z8IXz8IWf6p//h4P9cIcX+8U+bHIn5+E758InuPDB7XCHp/un/v4u6s8h/u53Y/88FvbhZ+/A+t4Fq4m88U7Xf0f9b6/b/f4u+u6i7f7pX7T5P/f7fN6P+R3V4eS9S4eT95YfCqf0I9r/Sj6qf0X7P6H9p9S/4rE4/Yjqj/Ljh8NrvzofD+9f3of4X+fDf6YfSvefG4fS/+4WnIeX4Dx84zx8AnHwCa44DzfBGX64v6IPr8F3PhL6U//8I9Q/pP4p9X/4uTjwfXFwDpzD5/AnuOI8vAVR8AlEwSe44jz8DafwMfwMfoIrfAw9OAnOwUlwDk4C5+EpOAWm4BSYAm7hJv7gXbwD/9rP4B9wBk5A5+AhOIGm4ASeArfDHeCGM8ApMAGmwBS4A9ygKThb8F1Mgykwhf3NFN7FNJgC61D/oPqH6p8S+5j0L6p/vP/b5/N+4Tz8Adf5SPhP/fMv7v6p//wU+/7C/fC3P8X3/Y37X+/+w4v7w5P3R0J/55+/uN8T3u8n5792X//C+X+W2p74/8S/5L8fFvxX7P8X/V/sf73/P/mP15f4/88T/Y8X9X/T/yX+S/xX7f+R7v8O9V9X9Y/3f0v956fq+7+4/5eN/v/Wf//B5+XG58Xm5+nG5+XW5+vW5+vm5+Pm58Pm5+Pm56L4XN4X5Xm44pW54pW54pX5YhXpYhUfP5//4H/8f/x/4v9N/X9p/V9S9/9hS+3/D5e//+D/D/7/+Af/f5P/AP8BEwY/f/kPABMAAAAASUVORK5CYII=">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Montserrat', 'sans-serif'], },
                    colors: {
                        custom: {
                            bg: '#0a0a0a',       
                            card: '#171717',     
                            border: '#262626',   
                            primary: '#F54927',  
                            hover: '#d43e20',    
                            text: '#F8FAFC',     
                            textMuted: '#94A3B8' 
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0a; color: #F8FAFC; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; display: none; }
        input[type=number] { -moz-appearance: textfield; font-family: 'Montserrat', sans-serif; }

        .tab-btn { color: #94A3B8; border-bottom: 3px solid transparent; }
        .tab-btn.active { border-bottom: 3px solid #F54927; color: #F8FAFC; font-weight: 700; }
        
        input[type="checkbox"] { width: 24px; height: 24px; accent-color: #F54927; cursor: pointer;}
        
        .canvas-container { display: none; margin-top: 1.5rem; height: 200px; position: relative; }
    </style>
</head>
<body class="p-4 pb-20 max-w-7xl mx-auto font-sans">

    <header class="text-center mb-10 mt-6 flex flex-col items-center gap-2">
        <h1 class="text-3xl font-bold text-custom-text uppercase tracking-wide">Mi Glow UP 🔥</h1>
        <div class="h-1 w-20 bg-custom-primary rounded"></div>
    </header>

    <div class="flex justify-around border-b border-custom-border mb-8 pb-3">
        <button class="tab-btn active font-semibold text-lg transition-colors pb-2 px-2" onclick="showDay('martes')">Martes</button>
        <button class="tab-btn font-semibold text-lg transition-colors pb-2 px-2" onclick="showDay('jueves')">Jueves</button>
        <button class="tab-btn font-semibold text-lg transition-colors pb-2 px-2" onclick="showDay('sabado')">Sábado</button>
    </div>

    <div id="exercise-container" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>

    <script>
        const routine = {
            martes: [
                { id: 'm1', name: 'Press Inclinado Barra', sets: 4, target: '8-10 reps', ytId: '2bKcaD7lHLs' },
                { id: 'm2', name: 'Jalón al Pecho (Abierto)', sets: 3, target: '10-12 reps', ytId: 'ryKtvHifeiU' },
                { id: 'm3', name: 'Remo Gironda', sets: 3, target: '10-12 reps', ytId: 'GZbfZ033f74' },
                { id: 'm4', name: 'Curl de Bíceps', sets: 3, target: '10 reps', ytId: 'ykJmrZ5v0Oo' },
                { id: 'm5', name: 'Extensión Tríceps (Soga)', sets: 3, target: '12 reps', ytId: 'vB5OHsJ3EME' },
                { id: 'm6', name: 'Elevaciones Laterales', sets: 3, target: 'Al fallo', ytId: '3VcKaXpzqRo' },
                { id: 'm7', name: 'Encogimientos Mancuernas', sets: 2, target: '15-20 reps', ytId: 'cJRVVxmytaM' }
            ],
            jueves: [
                { id: 'j1', name: 'Sentadilla Libre', sets: 4, target: '6-8 reps', ytId: 'VZpCjz340CY' },
                { id: 'j2', name: 'Extensión Cuádriceps', sets: 4, target: '15 reps', ytId: 'YyvSfVjQeL0' },
                { id: 'j3', name: 'Curl de Isquios', sets: 4, target: '12 reps', ytId: 'NSgMSk3L_Z4' },
                { id: 'j4', name: 'Pantorrillas Parado', sets: 4, target: '15 reps', ytId: '9gqP9qy1h0E' }, 
                { id: 'j5', name: 'Plancha Frontal (Plank)', sets: 3, target: '45-60 seg', ytId: 'pSHjTRCQxIw' },
                { id: 'j6', name: 'Elevación de Piernas', sets: 3, target: '15 reps', ytId: 'vHKtGCQP4Ug' }, 
                { id: 'j7', name: 'Rueda Abdominal / Deadbug', sets: 3, target: '12 reps', ytId: '0edLJHwE-M8' } 
            ],
            sabado: [
                { id: 's1', name: 'Press Inclinado Barra', sets: 4, target: '8-10 reps', ytId: '2bKcaD7lHLs' },
                { id: 's2', name: 'Jalón al Pecho (Cerrado)', sets: 3, target: '10-12 reps', ytId: 'CpvGa9QzNzM' }, 
                { id: 's3', name: 'Remo Gironda', sets: 3, target: '10-12 reps', ytId: 'GZbfZ033f74' },
                { id: 's4', name: 'Curl de Bíceps', sets: 3, target: '10 reps', ytId: 'ykJmrZ5v0Oo' },
                { id: 's5', name: 'Extensión Tríceps (Polea)', sets: 3, target: '12 reps', ytId: '2-LAMcpzODU' },
                { id: 's6', name: 'Elevaciones Laterales', sets: 3, target: 'Al fallo', ytId: '3VcKaXpzqRo' },
                { id: 's7', name: 'Encogimientos', sets: 2, target: '15-20 reps', ytId: 'cJRVVxmytaM' }
            ]
        };

        const currentCharts = {};

        // Función Blindada para mostrar los ejercicios
        function showDay(day) {
            try {
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.classList.remove('active');
                    if(btn.innerText.toLowerCase() === day || (day==='sabado' && btn.innerText==='Sábado')) btn.classList.add('active');
                });

                const container = document.getElementById('exercise-container');
                container.innerHTML = '';

                routine[day].forEach(ex => {
                    let setsHtml = '';
                    for(let i=1; i<=ex.sets; i++) {
                        setsHtml += `
                            <div class="flex items-center justify-between mb-3 bg-custom-bg p-3 rounded-lg border border-custom-border shadow-sm">
                                <span class="w-16 text-sm font-medium text-custom-textMuted">Serie ${i}</span>
                                <input type="number" id="peso-${ex.id}-${i}" placeholder="Kg" class="w-[70px] h-[40px] px-1 rounded bg-custom-bg border border-custom-border text-custom-text text-center focus:outline-none focus:border-custom-primary transition-colors text-lg font-semibold">
                                <input type="number" id="reps-${ex.id}-${i}" placeholder="Rep" class="w-[70px] h-[40px] px-1 rounded bg-custom-bg border border-custom-border text-custom-text text-center focus:outline-none focus:border-custom-primary transition-colors text-lg font-semibold">
                                <input type="checkbox" id="check-${ex.id}-${i}">
                            </div>
                        `;
                    }

                    const card = `
                        <div class="bg-custom-card p-5 md:p-6 rounded-2xl shadow-lg border border-custom-border">
                            
                            <div class="mb-5 bg-[#0d0d0d] rounded-xl overflow-hidden flex flex-col justify-center items-center border border-custom-border relative aspect-square">
                                <img src="gifs/${ex.id}.gif" alt="Anatomía de ${ex.name}" class="absolute inset-0 w-full h-full object-contain z-10" onerror="this.style.display='none'; document.getElementById('fallback-${ex.id}').style.display='flex';">
                                
                                <div id="fallback-${ex.id}" style="display: none;" class="flex-col items-center justify-center p-4 text-center z-0 w-full h-full bg-[#0d0d0d]">
                                    <svg class="w-12 h-12 text-custom-primary mb-2 opacity-80" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                                    <p class="text-xs text-custom-textMuted font-medium">Falta agregar tu GIF anatómico</p>
                                    <p class="text-[10px] text-[#475569] mt-1">Guardalo en GitHub como: <br><span class="text-custom-primary font-mono font-bold">${ex.id}.gif</span></p>
                                </div>
                            </div>
                            
                            <h3 class="text-xl md:text-2xl font-bold mb-1 text-custom-text">${ex.name}</h3>
                            <p class="text-sm font-medium text-custom-textMuted mb-5">Objetivo: ${ex.sets} series x ${ex.target}</p>
                            
                            <div class="aspect-video rounded-lg overflow-hidden border border-custom-border mb-6 bg-black shadow-inner">
                                <iframe 
                                    class="w-full h-full" 
                                    src="https://www.youtube.com/embed/${ex.ytId}" 
                                    title="Técnica de ${ex.name}" 
                                    frameborder="0" 
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                                    allowfullscreen>
                                </iframe>
                            </div>

                            ${setsHtml}
                            
                            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mt-6">
                                <button onclick="saveData('${ex.id}', ${ex.sets}, '${ex.name}')" class="bg-custom-primary hover:bg-custom-hover text-white font-bold py-3 px-4 rounded-xl transition-colors shadow-md">
                                    Guardar Hoy
                                </button>
                                <button onclick="toggleChart('${ex.id}', '${ex.name}')" id="btn-chart-${ex.id}" class="bg-custom-bg hover:bg-custom-border border border-custom-border text-custom-textMuted font-medium py-3 px-4 rounded-xl transition-colors text-sm shadow-sm">
                                    Ver Evolución
                                </button>
                            </div>

                            <div id="chart-container-${ex.id}" class="canvas-container bg-custom-bg p-3 rounded-xl border border-custom-border">
                                <div id="no-data-${ex.id}" class="absolute inset-0 flex items-center justify-center text-custom-textMuted font-medium text-sm hidden">
                                    Se necesitan al menos 2 sesiones
                                </div>
                                <canvas id="chart-${ex.id}"></canvas>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;
                });
            } catch (error) {
                console.error("Fallo general al cargar los ejercicios:", error);
            }
        }

        function saveData(exId, totalSets, exName) {
            let maxWeight = 0;
            for(let i=1; i<=totalSets; i++) {
                const isChecked = document.getElementById(`check-${exId}-${i}`).checked;
                if(isChecked) {
                    const weight = parseFloat(document.getElementById(`peso-${exId}-${i}`).value) || 0;
                    if(weight > maxWeight) maxWeight = weight;
                }
            }

            if(maxWeight > 0) {
                const today = new Date().toLocaleDateString('es-AR', {day: 'numeric', month: 'short'});
                
                // Lectura segura de la base de datos local
                let history = {};
                try {
                    history = JSON.parse(localStorage.getItem('workoutData')) || {};
                } catch(e) { history = {}; }
                
                if(!history[exName]) history[exName] = { dates: [], weights: [] };
                
                const lastIndex = history[exName].dates.indexOf(today);
                if(lastIndex > -1) {
                    history[exName].weights[lastIndex] = maxWeight;
                } else {
                    if(history[exName].dates.length >= 10){
                        history[exName].dates.shift();
                        history[exName].weights.shift();
                    }
                    history[exName].dates.push(today);
                    history[exName].weights.push(maxWeight);
                }

                localStorage.setItem('workoutData', JSON.stringify(history));
                
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = "✓ Registrado";
                btn.classList.replace('bg-custom-primary', 'bg-emerald-600');
                btn.classList.replace('hover:bg-custom-hover', 'hover:bg-emerald-700');
                
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.replace('bg-emerald-600', 'bg-custom-primary');
                    btn.classList.replace('hover:bg-emerald-700', 'hover:bg-custom-hover');
                }, 1500);

                const chartDiv = document.getElementById(`chart-container-${exId}`);
                if(chartDiv.style.display === 'block') {
                    renderIndividualChart(exId, exName);
                }

            } else {
                alert('Tildá al menos una serie completada y poné el peso máximo para guardar el progreso de hoy.');
            }
        }

        function toggleChart(exId, exName) {
            const chartDiv = document.getElementById(`chart-container-${exId}`);
            const btn = document.getElementById(`btn-chart-${exId}`);
            
            if(chartDiv.style.display === 'block') {
                chartDiv.style.display = 'none';
                btn.innerText = "Ver Evolución";
            } else {
                chartDiv.style.display = 'block';
                btn.innerText = "Ocultar Evolución";
                renderIndividualChart(exId, exName);
            }
        }

        // Gráfico Blindado (No rompe la app si el internet falla)
        function renderIndividualChart(exId, exName) {
            let historyData = {};
            try {
                historyData = JSON.parse(localStorage.getItem('workoutData')) || {};
            } catch(e) { historyData = {}; }
            
            const exerciseData = historyData[exName];

            const noDataMsg = document.getElementById(`no-data-${exId}`);
            const canvasEl = document.getElementById(`chart-${exId}`);

            if(!exerciseData || exerciseData.dates.length < 2) {
                noDataMsg.classList.remove('hidden');
                canvasEl.style.display = 'none';
                return;
            } else {
                noDataMsg.classList.add('hidden');
                canvasEl.style.display = 'block';
            }

            if(typeof Chart === 'undefined') {
                noDataMsg.innerText = "No se pudieron cargar los gráficos (Revisá tu conexión)";
                noDataMsg.classList.remove('hidden');
                canvasEl.style.display = 'none';
                return;
            }

            // Aplicar tipografía solo si Chart está disponible
            Chart.defaults.font.family = "'Montserrat', sans-serif";
            Chart.defaults.color = '#94A3B8';

            if(currentCharts[exId]) { currentCharts[exId].destroy(); }

            const ctx = canvasEl.getContext('2d');
            
            currentCharts[exId] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: exerciseData.dates,
                    datasets: [{
                        label: 'Máxima Carga (Kg)',
                        data: exerciseData.weights,
                        borderColor: '#F54927', 
                        backgroundColor: 'rgba(245, 73, 39, 0.1)',
                        borderWidth: 3,
                        tension: 0.3,
                        pointRadius: 5,
                        pointBackgroundColor: '#F8FAFC',
                        pointBorderColor: '#F54927'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: false, grid: { color: '#262626' } },
                        x: { grid: { display: false } }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        // Evento seguro: Solo dibuja cuando toda la página esté lista
        document.addEventListener('DOMContentLoaded', () => {
            showDay('martes');
        });
    </script>
</body>
</html>
