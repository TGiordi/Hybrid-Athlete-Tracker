<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Ganancia Muscular</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #121212; color: #e0e0e0; font-family: sans-serif; }
        .tab-btn.active { border-bottom: 2px solid #3b82f6; color: #3b82f6; }
        input[type="number"] { background-color: #1e1e1e; border: 1px solid #333; color: white; text-align: center; }
        input[type="checkbox"] { width: 22px; height: 22px; accent-color: #3b82f6; }
    </style>
</head>
<body class="p-4 pb-20">

    <h1 class="text-2xl font-bold text-center mb-6 text-blue-500">Mi Rutina - Voley & Fútbol</h1>

    <div class="flex justify-around border-b border-gray-700 mb-6 pb-2">
        <button class="tab-btn active font-semibold text-lg" onclick="showDay('martes')">Martes</button>
        <button class="tab-btn font-semibold text-lg" onclick="showDay('jueves')">Jueves</button>
        <button class="tab-btn font-semibold text-lg" onclick="showDay('sabado')">Sábado</button>
    </div>

    <div id="exercise-container" class="space-y-6"></div>

    <div class="mt-10 bg-gray-800 p-4 rounded-lg shadow-lg">
        <h2 class="text-xl font-bold mb-4 text-center">Evolución de Cargas (Kg)</h2>
        <canvas id="progressChart"></canvas>
    </div>

    <script>
        // Base de datos de la rutina completa
        const routine = {
            martes: [
                { id: 'm1', name: 'Press Inclinado con Barra', sets: 4, target: '8-10 reps', img: 'https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=press+inclinado+con+barra+tecnica' },
                { id: 'm2', name: 'Jalón al Pecho (Abierto)', sets: 3, target: '10-12 reps', img: 'https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=jalon+al+pecho+agarre+abierto+tecnica' },
                { id: 'm3', name: 'Remo Gironda', sets: 3, target: '10-12 reps', img: 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=remo+gironda+tecnica' },
                { id: 'm4', name: 'Curl de Bíceps', sets: 3, target: '10 reps', img: 'https://images.unsplash.com/photo-1581009137042-c552e485697a?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=curl+de+biceps+con+barra+tecnica' },
                { id: 'm5', name: 'Extensión de Tríceps (Soga)', sets: 3, target: '12 reps', img: 'https://images.unsplash.com/photo-1530822847156-5df684ec5ee1?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=extension+de+triceps+en+polea+con+cuerda' },
                { id: 'm6', name: 'Elevaciones Laterales (Dropset)', sets: 3, target: 'Al fallo', img: 'https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=elevaciones+laterales+mancuernas+tecnica' },
                { id: 'm7', name: 'Encogimientos con Mancuernas', sets: 2, target: '15-20 reps', img: 'https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=encogimientos+de+hombros+con+mancuernas' }
            ],
            jueves: [
                { id: 'j1', name: 'Sentadilla Libre (Explosiva)', sets: 4, target: '6-8 reps', img: 'https://images.unsplash.com/photo-1566241440091-ec10de8db2e1?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=sentadilla+libre+tecnica+correcta' },
                { id: 'j2', name: 'Extensión Cuádriceps (+1 Der.)', sets: 4, target: '15 reps', img: 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=extension+de+cuadriceps+maquina' },
                { id: 'j3', name: 'Curl de Isquios', sets: 4, target: '12 reps', img: 'https://images.unsplash.com/photo-1574680178050-55c6a6a96e0a?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=curl+de+isquiotibiales+maquina' },
                { id: 'j4', name: 'Pantorrillas Parado', sets: 4, target: '15 reps', img: 'https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=elevacion+de+talones+de+pie' },
                { id: 'j5', name: 'Plancha Frontal (Plank)', sets: 3, target: '45-60 seg', img: 'https://images.unsplash.com/photo-1566241477600-ac0244c70133?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=plancha+abdominal+tecnica' },
                { id: 'j6', name: 'Elevación de Piernas', sets: 3, target: '15 reps', img: 'https://images.unsplash.com/photo-1571019613454-1cb2f99b2d8b?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=elevacion+de+piernas+acostado' },
                { id: 'j7', name: 'Rueda Abdominal / Deadbug', sets: 3, target: '12 reps', img: 'https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=rueda+abdominal+tecnica+correcta' }
            ],
            sabado: [
                { id: 's1', name: 'Press Inclinado con Barra', sets: 4, target: '8-10 reps', img: 'https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=press+inclinado+con+barra+tecnica' },
                { id: 's2', name: 'Jalón al Pecho (Cerrado)', sets: 3, target: '10-12 reps', img: 'https://images.unsplash.com/photo-1581009146145-b5ef050c2e1e?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=jalon+al+pecho+agarre+estrecho+supino' },
                { id: 's3', name: 'Remo Gironda', sets: 3, target: '10-12 reps', img: 'https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=remo+gironda+tecnica' },
                { id: 's4', name: 'Curl de Bíceps', sets: 3, target: '10 reps', img: 'https://images.unsplash.com/photo-1581009137042-c552e485697a?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=curl+de+biceps+con+mancuernas' },
                { id: 's5', name: 'Extensión de Tríceps (Polea)', sets: 3, target: '12 reps', img: 'https://images.unsplash.com/photo-1530822847156-5df684ec5ee1?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=extension+de+triceps+en+polea' },
                { id: 's6', name: 'Elevaciones Laterales', sets: 3, target: 'Al fallo', img: 'https://images.unsplash.com/photo-1541534741688-6078c6bfb5c5?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=elevaciones+laterales+mancuernas' },
                { id: 's7', name: 'Encogimientos con Mancuernas', sets: 2, target: '15-20 reps', img: 'https://images.unsplash.com/photo-1583454110551-21f2fa2afe61?auto=format&fit=crop&w=400&q=80', video: 'https://www.youtube.com/results?search_query=encogimientos+de+hombros+con+mancuernas' }
            ]
        };

        let chartInstance = null;

        function showDay(day) {
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.innerText.toLowerCase() === day || (day==='sabado' && btn.innerText==='Sábado')) btn.classList.add('active');
            });

            const container = document.getElementById('exercise-container');
            container.innerHTML = '';

            routine[day].forEach(ex => {
                let setsHtml = '';
                for(let i=1; i<=ex.sets; i++) {
                    setsHtml += `
                        <div class="flex items-center justify-between mb-3 bg-gray-700 p-2 rounded">
                            <span class="w-16 text-sm">Serie ${i}</span>
                            <input type="number" id="peso-${ex.id}-${i}" placeholder="Kg/Lbs" class="w-20 p-1 rounded">
                            <input type="number" id="reps-${ex.id}-${i}" placeholder="Reps" class="w-16 p-1 rounded">
                            <input type="checkbox" id="check-${ex.id}-${i}">
                        </div>
                    `;
                }

                const card = `
                    <div class="bg-gray-800 p-4 rounded-lg shadow-lg border border-gray-700">
                        <img src="${ex.img}" alt="${ex.name}" class="w-full h-40 object-cover rounded mb-4 opacity-80">
                        <h3 class="text-xl font-bold mb-1 text-white">${ex.name}</h3>
                        <p class="text-sm text-gray-400 mb-2">Objetivo: ${ex.sets} series x ${ex.target}</p>
                        
                        <a href="${ex.video}" target="_blank" class="block text-center mb-4 text-red-500 hover:text-red-400 text-sm font-semibold border border-red-500 rounded py-1 transition-colors">
                            ▶️ Ver Video Explicativo en YouTube
                        </a>

                        ${setsHtml}
                        <button onclick="saveData('${ex.id}', ${ex.sets}, '${ex.name}')" class="mt-4 w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-4 rounded transition-colors">
                            Guardar Progreso
                        </button>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function saveData(exId, totalSets, exName) {
            let maxWeight = 0;
            for(let i=1; i<=totalSets; i++) {
                const isChecked = document.getElementById(`check-${exId}-${i}`).checked;
                if(isChecked) {
                    const weight = parseFloat(document.getElementById(`peso-${exId}-${i}`).value) || 0;
                    if(weight > maxWeight) maxWeight = weight;
                }
            }

            if(maxWeight > 0) {
                const today = new Date().toLocaleDateString('es-AR');
                let history = JSON.parse(localStorage.getItem('workoutData')) || {};
                
                if(!history[exName]) history[exName] = { dates: [], weights: [] };
                
                const lastIndex = history[exName].dates.indexOf(today);
                if(lastIndex > -1) {
                    history[exName].weights[lastIndex] = maxWeight;
                } else {
                    history[exName].dates.push(today);
                    history[exName].weights.push(maxWeight);
                }

                localStorage.setItem('workoutData', JSON.stringify(history));
                
                // Efecto visual de guardado
                const btn = event.target;
                const originalText = btn.innerText;
                btn.innerText = "¡Guardado! ✓";
                btn.classList.replace('bg-blue-600', 'bg-green-600');
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.classList.replace('bg-green-600', 'bg-blue-600');
                }, 2000);

                updateChart();
            } else {
                alert('Por favor, tildá al menos una serie y agregá el peso para guardar tu progreso.');
            }
        }

        function updateChart() {
            const data = JSON.parse(localStorage.getItem('workoutData')) || {};
            const ctx = document.getElementById('progressChart').getContext('2d');
            
            const datasets = Object.keys(data).map((exName, index) => {
                const colors = ['#3b82f6', '#ef4444', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899', '#06b6d4'];
                return {
                    label: exName,
                    data: data[exName].weights,
                    borderColor: colors[index % colors.length],
                    backgroundColor: colors[index % colors.length],
                    tension: 0.3,
                    fill: false,
                    pointRadius: 4
                };
            });

            let allDates = [];
            Object.values(data).forEach(ex => {
                if(ex.dates.length > allDates.length) allDates = ex.dates;
            });

            if(chartInstance) chartInstance.destroy();

            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: allDates, datasets: datasets },
                options: {
                    responsive: true,
                    scales: {
                        y: { beginAtZero: false, grid: { color: '#333' }, ticks: { color: '#aaa' } },
                        x: { grid: { color: '#333' }, ticks: { color: '#aaa' } }
                    },
                    plugins: { legend: { labels: { color: '#e0e0e0', font: { size: 10 } } } }
                }
            });
        }

        // Iniciar App
        showDay('martes');
        updateChart();
    </script>
</body>
</html>
